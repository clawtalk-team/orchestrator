version: "3.8"

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: orchestrator-dynamodb-local
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"
    networks:
      - orchestrator-network
      - e2e_clawtalk

  orchestrator:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-dev}
    image: clawtalk-orchestrator:${GIT_COMMIT:-dev}
    container_name: orchestrator-app
    ports:
      - "8574:8574"
    environment:
      - APP_NAME=orchestrator
      - DEBUG=true
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_DEFAULT_REGION=ap-southeast-2
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - CONTAINERS_TABLE=openclaw-containers
      - ECS_CLUSTER_NAME=openclaw
      - ECS_TASK_DEFINITION=openclaw-agent
      - ECS_CONTAINER_NAME=openclaw-agent
      - AUTH_GATEWAY_URL=http://auth-gateway:8789
      - SSM_PREFIX=/clawtalk/orchestrator
      - MASTER_API_KEY=test-master-key
    depends_on:
      - dynamodb-local
    networks:
      - orchestrator-network
      - e2e_clawtalk
    command: uvicorn app.main:app --host 0.0.0.0 --port 8574

networks:
  orchestrator-network:
    driver: bridge
  e2e_clawtalk:
    external: true
